# Training configuration for MoE Vision-Language Model
# Replace all YOUR_PATH_HERE placeholders with your actual paths before training.

paths:
  # Base language model (Mistral-7B-v0.3 from HuggingFace or local)
  mistral_local_path: "YOUR_PATH_HERE/Mistral-7B-v0.3"
  # Vision encoder (openai/clip-vit-large-patch14 from HuggingFace or local)
  clip_local_path: "YOUR_PATH_HERE/clip-vit-large-patch14"

  # COCO dataset (used by Stage 1, 2, 2.5, and the dense baseline)
  image_dir: "YOUR_PATH_HERE/coco/train2017"
  annotations_file: "YOUR_PATH_HERE/coco/annotations/captions_train2017.json"

  # LLaVA-Instruct-150K dataset (used by Stage 3)
  llava_annotations_file: "YOUR_PATH_HERE/llava_instruct_150k.json"
  llava_image_dir: "YOUR_PATH_HERE/llava/images/train2017"

  # MoE model created from Mistral-7B via models/utils/create_moe_model.py
  moe_model_path: "YOUR_PATH_HERE/Mistral-7B-MoE"

  # Where checkpoints and results are saved
  output_dir: "YOUR_PATH_HERE/outputs"

training_stage1:
  num_epochs: 5
  batch_size: 18
  learning_rate: 0.0000075
  subset_fraction: 1
  weight_decay: 0.1
  gradient_accumulation_steps: 2

training_stage2:
  num_epochs: 20
  batch_size: 16
  learning_rate: 0.00002
  weight_decay: 0.01
  subset_fraction: 0.5
  gradient_accumulation_steps: 4

training_stage2.5:
  num_epochs: 20
  batch_size: 12
  learning_rate: 0.0001
  weight_decay: 0.01
  subset_fraction: 0.15
  gradient_accumulation_steps: 2
  load_balancing_coeff: 0.0

training_stage3:
  num_epochs: 25
  batch_size: 2
  learning_rate: 0.00005
  weight_decay: 0.03
  subset_fraction: 0.5
  val_subset_fraction: 0.5
  gradient_accumulation_steps: 4
  load_balancing_coeff: 0.00
  attention_dropout: 0.1
  expert_dropout: 0.1
  label_smoothing: 0.1
  dataset: "llava"  # "coco" or "llava"

dense_control:
  num_epochs: 10
  batch_size: 16
  learning_rate: 0.0001
  weight_decay: 0.01
  subset_fraction: 0.2
  gradient_accumulation_steps: 4
  load_balancing_coeff: 0.02

dataloader:
  num_workers: 2
  num_workers_s1: 4
  data_seed: 42
