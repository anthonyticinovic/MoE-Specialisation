# file: config.yaml

# Paths to local models and data
paths:
  mistral_local_path: "/data/gpfs/projects/COMP90055/aticinovic/models/Mistral-7B-v0.3"
  clip_local_path: "/data/gpfs/projects/COMP90055/aticinovic/models/clip-vit-large-patch14"
  
  # COCO dataset paths (used by Stage 1, 2, 2.5, and dense control)
  image_dir: "/data/gpfs/projects/COMP90055/aticinovic/datasets/coco/train2017"
  annotations_file: "/data/gpfs/projects/COMP90055/aticinovic/datasets/coco/annotations/captions_train2017.json"
  
  # LLaVA-Instruct-150K dataset paths (used by Stage 3)
  llava_annotations_file: "/data/gpfs/projects/COMP90055/aticinovic/datasets/llava/instruct_150k/llava_instruct_150k.json"
  llava_image_dir: "/data/gpfs/projects/COMP90055/aticinovic/datasets/llava/images/train2017"

  output_dir: "/data/gpfs/projects/COMP90055/aticinovic/outputs"

training_stage1:
  num_epochs: 5
  batch_size: 18
  learning_rate: 0.0000075
  subset_fraction: 1
  weight_decay: 0.1
  gradient_accumulation_steps: 2

training_stage2:
  num_epochs: 20
  batch_size: 16
  learning_rate: 0.00002
  weight_decay: 0.01
  subset_fraction: 0.5
  gradient_accumulation_steps: 4

training_stage2.5:
  num_epochs: 20
  batch_size: 12
  learning_rate: 0.0001
  weight_decay: 0.01
  subset_fraction: 0.15
  gradient_accumulation_steps: 2
  load_balancing_coeff: 0.0

training_stage3:
  num_epochs: 15
  batch_size: 2
  learning_rate: 0.0001
  weight_decay: 0.03
  subset_fraction: 0.3
  val_subset_fraction: 0.1
  gradient_accumulation_steps: 4
  load_balancing_coeff: 0.00
  attention_dropout: 0.1
  expert_dropout: 0.1
  label_smoothing: 0.1
  dataset: "llava"  # "coco" or "llava"

dense_control:
  num_epochs: 10
  batch_size: 16
  learning_rate: 0.0001
  weight_decay: 0.01
  subset_fraction: 0.2
  gradient_accumulation_steps: 4
  load_balancing_coeff: 0.02


# Dataloader parameters
dataloader:
  num_workers: 2
  num_workers_s1: 4
  data_seed: 42  # Fixed seed for reproducible data splits across all training stages
